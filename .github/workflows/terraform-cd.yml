name: CD - GCP Artifact Registry (Apply / Destroy)

on:
  workflow_dispatch:
    inputs:
      command:
        description: Terraform operation
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply
      project_id:
        description: GCP project ID
        required: true
        type: string
      region:
        description: "GCP region (Free Tier: us-east1, us-west1, us-central1)"
        required: true
        type: string
        default: us-central1
      repository_id:
        description: Base ID of the repository
        required: true
        type: string
        default: docker-repo
      description:
        description: Description of the repository
        required: true
        type: string
        default: Docker repository for storing container images
      reader_members:
        description: Reader members as HCL list, e.g. ["user:foo@example.com"]
        required: false
        type: string
        default: "[]"
      writer_members:
        description: Writer members as HCL list, e.g. ["user:foo@example.com"]
        required: false
        type: string
        default: "[]"

env: {}

jobs:
  provision:
    name: Terraform ${{ github.event.inputs.command }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: |
          terraform plan ${{ github.event.inputs.command == 'destroy' && '-destroy' || '' }} \
            -var="project_id=${{ github.event.inputs.project_id }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="repository_id=${{ github.event.inputs.repository_id }}" \
            -var="description=${{ github.event.inputs.description }}" \
            -var="reader_members=${{ github.event.inputs.reader_members }}" \
            -var="writer_members=${{ github.event.inputs.writer_members }}"
      - name: Terraform Apply / Destroy
        run: |
          terraform ${{ github.event.inputs.command }} -auto-approve \
            -var="project_id=${{ github.event.inputs.project_id }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="repository_id=${{ github.event.inputs.repository_id }}" \
            -var="description=${{ github.event.inputs.description }}" \
            -var="reader_members=${{ github.event.inputs.reader_members }}" \
            -var="writer_members=${{ github.event.inputs.writer_members }}"
